# Example config for the infra-release skill.
# Copy to:  ${XDG_CONFIG_HOME:-$HOME/.config}/infra-release/config.yaml
# (or let the skill generate it on first setup). Do NOT commit your real config.

cloudId: ""                          # Atlassian site (UUID). The skill discovers it via getAccessibleAtlassianResources.
jiraBaseUrl: ""                      # e.g. https://yoursite.atlassian.net
projectKey: ""                       # e.g. OPS

doneStatusCategory: "Done"           # status category of completed cards (these go into the release)
inProgressStatusCategory: "In Progress"
nextStatusName: ""                   # the "coming up" status (e.g. "To Do" / "Ready"); empty = skip that section

confluence:
  spaceId: ""                        # space where the page is created
  parentId: ""                       # parent folder or page (optional; empty = space root)

releaseTitlePrefix: "Release Notes"  # title prefix; the final title gets " — YYYY-MM-DD"
outputLanguage: "English"            # language of the generated release (Confluence + Slack), e.g. "English", "Português"
